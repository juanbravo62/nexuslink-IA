<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Login-nexuslink</title>

<style>

.logo{
width:300px;
display:block;
margin:0 auto -70px;
}


body{
background:#020617;
color:white;
font-family:Inter;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.login-box{
background:#0f172a;
padding:50px;
border-radius:10px;
width:300px;
}

input{
width:93%;
padding:13px;
margin-top:10px;
border:none;
border-radius:5px;
}

button{
width:100%;
margin-top:20px;
padding:10px;
background:#22c55e;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="login-box">

<img src="assets/logo.png" class="logo">

<h2>Entrar</h2>

<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

<p>Não tem conta? <a href="register.html">Criar conta</a></p>

</div>

<script src="auth.js"></script>




</div>

<script src="auth.js"></script>

</body>
</html>
