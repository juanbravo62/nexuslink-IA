<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NexusLink</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="header">

<img src="assets/logo.png" class="logo">

<p class="subtitle">Gerador de Ofertas com IA</p>

</div>

<div class="user-info">

<span id="userEmail"></span>

<button class="logout-btn" onclick="logout()">Sair</button>

</div>

<div class="container">

<div class="left">

<input id="produto" placeholder="Produto">

<input id="valorReal" placeholder="Preço normal">

<input id="valorPromo" placeholder="Preço promoção">

<select id="loja">
<option>Mercado Livre</option>
<option>Amazon</option>
<option>Shopee</option>
<option>Magazine Luiza</option>
</select>

<input id="cupom" placeholder="Cupom">

<input id="link" placeholder="Link afiliado">

<button onclick="gerarOferta()">Gerar texto com IA</button>

</div>

<div class="right">

<textarea id="previewOferta" placeholder="Prévia da oferta"></textarea>

<button onclick="compartilharWhatsapp()">Compartilhar WhatsApp</button>

</div>

</div>

<div class="ofertas-container">

<div class="oferta-card">

<h3>Oferta 1</h3>

<textarea id="oferta1"></textarea>

<button onclick="copiarTexto('oferta1')">Copiar</button>

</div>

<div class="oferta-card">

<h3>Oferta 2</h3>

<textarea id="oferta2"></textarea>

<button onclick="copiarTexto('oferta2')">Copiar</button>

</div>

<div class="oferta-card">

<h3>Oferta 3</h3>

<textarea id="oferta3"></textarea>

<button onclick="copiarTexto('oferta3')">Copiar</button>

</div>

<div class="oferta-card">

<h3>Oferta 4</h3>

<textarea id="oferta4"></textarea>

<button onclick="copiarTexto('oferta4')">Copiar</button>

</div>

</div>

<a class="whatsapp-suporte" href="#">Suporte</a>

<script src="app.js"></script>

</body>
</html>
